<!DOCTYPE html>
{% load static %}
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="{% static 'icons/image.png' %}" type="image/x-icon">
    <link rel="apple-touch-icon" href="{% static 'icons/image.png' %}">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#050505">
    <title>Ro'yxatdan o'tish | BMK</title>


    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">

    <style>
        :root { --accent: #a8ff78; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background-color: black;
            color: white;
        }

        /* 1. Fon - Interstellar Qora Tuynuk */
        .background-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 0;
            background-image: url('https://preview.redd.it/cool-black-hole-in-blender-3-5-cycles-v0-142ccuj1w2sa1.png?width=1920&format=png&auto=webp&s=cc0df69e9c3974ec75a62c073b9fd595015f62d4');
            background-size: cover;
            background-position: center;
            filter: brightness(30%) contrast(115%);
        }

        /* 2. Registratsiya kartasi */
        .reg-wrapper {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .glass-card {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(168, 255, 120, 0.2);
            padding: 35px 25px;
            border-radius: 30px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            margin: 0 0 25px 0;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 1.4rem;
            background: linear-gradient(to right, #ffffff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 0.95rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(168, 255, 120, 0.1);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, #28a745, var(--accent));
            border: none;
            border-radius: 15px;
            color: #000;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
        }

        button:active { transform: scale(0.96); }

        .error {
            background: rgba(255, 77, 77, 0.15);
            color: #ff7675;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 77, 77, 0.3);
        }

        .login-link {
            margin-top: 20px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
        }

        .login-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        /* Mobil qurilmalar uchun kichikroq padding */
        @media (max-width: 480px) {
            .glass-card { padding: 25px 20px; }
            h2 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="background-container"></div>

    <div class="reg-wrapper">
        <div class="glass-card">
            <h2>Ro'yxatdan o'tish</h2>

            {% if error_message %}
                <p class="error">{{ error_message }}</p>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <input type="hidden" name="device_id" id="device_id_reg">

                <div class="form-grid">
                    <input type="text" name="full_name" placeholder="F.I.O (To'liq ism)" required>
                    <input type="text" name="u_name" placeholder="Login tanlang" required>
                    <input type="password" name="p_val" placeholder="Parol o'ylab toping" required>
                    <input type="text" name="phone" placeholder="Telefon raqam" required>
                    <input type="text" name="mahalla" placeholder="Mahalla nomi" required>

                    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 10px;">
                        <input type="text" name="kocha" placeholder="Ko'cha" required>
                        <input type="text" name="uy_raqami" placeholder="Uy №" required>
                    </div>
                </div>

                <button type="submit">Hisob yaratish</button>

                <div class="login-link">
                    Hisobingiz bormi? <a href="/login/">Kirish</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        let dId = localStorage.getItem('device_token');
        if (!dId) {
            dId = 'D-' + Math.random().toString(36).substring(2) + Date.now();
            localStorage.setItem('device_token', dId);
        }
        document.getElementById('device_id_reg').value = dId;
    </script>
</body>
</html>

<!DOCTYPE html>
{% load static %}
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="{% static 'icons/image.png' %}" type="image/x-icon">
    <link rel="apple-touch-icon" href="{% static 'icons/image.png' %}">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#050505">
    <title>BMK - Birlashgan Mahallalar Kengashi</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Montserrat:wght@900&display=swap" rel="stylesheet">

    <style>
        :root { --accent: #a8ff78; --green: #28a745; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: black;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .background-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 0;
            background-image: url('https://preview.redd.it/cool-black-hole-in-blender-3-5-cycles-v0-142ccuj1w2sa1.png?width=1920&format=png&auto=webp&s=cc0df69e9c3974ec75a62c073b9fd595015f62d4');
            background-size: cover;
            background-position: center;
            filter: brightness(40%) contrast(110%);
        }

        nav {
            position: relative;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        nav h2 {
            margin: 0; font-size: 1.1rem; font-weight: 700;
            background: linear-gradient(to right, #ffffff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-buttons { display: flex; gap: 8px; }

        .btn {
            padding: 10px 18px; border-radius: 12px; font-weight: 700;
            text-transform: uppercase; font-size: 0.75rem; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none; border: none; outline: none;
        }

        .btn:active { transform: scale(0.92); filter: brightness(0.9); }

        .btn-green {
            background: linear-gradient(45deg, var(--green), var(--accent));
            color: #000; box-shadow: 0 4px 15px rgba(168, 255, 120, 0.2);
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.1);
            color: white; border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
        }

        .hero-section {
            position: relative; z-index: 10; height: calc(100vh - 70px);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; padding: 0 25px; text-align: center;
        }

        .hero-title {
            font-family: 'Montserrat', sans-serif; font-size: 1.8rem;
            font-weight: 900; margin-bottom: 10px; color: var(--accent);
            text-transform: uppercase; animation: fadeInUp 0.8s ease-out;
        }

        .hero-desc {
            color: rgba(255,255,255,0.7); max-width: 320px;
            font-size: 0.95rem; margin-bottom: 35px; animation: fadeInUp 1s ease-out;
        }

        .extra-actions {
            display: flex; flex-direction: column; gap: 15px;
            width: 100%; max-width: 280px; animation: fadeInUp 1.2s ease-out;
        }

        .admin-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 320px; background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(30px); border: 1px solid rgba(168, 255, 120, 0.3);
            border-radius: 25px; padding: 30px; z-index: 2000; display: none;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8); text-align: center;
        }

        .admin-modal input {
            width: 90%; padding: 15px; margin: 20px 0;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px; color: white; text-align: center; font-size: 1.2rem;
        }

        .dev-info {
            position: absolute; bottom: 30px; font-size: 0.8rem;
            color: var(--accent); opacity: 0.5; padding: 10px; cursor: pointer;
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake {
            0%, 100% { transform: translate(-50%, -50%); }
            20%, 60% { transform: translate(-52%, -50%); }
            40%, 80% { transform: translate(-48%, -50%); }
        }
    </style>
</head>
<body>

    <div class="background-container"></div>

    <div class="admin-modal" id="adminModal">
        <h3 style="margin:5px; color: var(--accent);">Rais Paneli</h3>
        <p style="margin:0; color:white;">Maxfiy kodni kiriting</p>
        <input type="password" id="adminPass" inputmode="numeric" placeholder="****">
        <button onclick="checkAdminPass()" class="btn btn-green" style="width: 100%; padding: 15px;">KIRISH</button>
        <p id="errorMsg" style="color: #ff4d4d; font-size: 0.8rem; margin-top: 10px; display: none;">Xato kod!</p>
        <button onclick="closeAdminModal()" style="background:none; border:none; color:white; opacity:0.5; margin-top:15px; cursor:pointer;">Yopish</button>
    </div>

    <nav>
        <h2>BMK KENGASHI</h2>
        <div class="nav-buttons">
            <form action="{% url 'sms_send' %}" method="POST" style="margin:0;">
                {% csrf_token %}
                <button type="submit" class="btn btn-green">Budget</button>
            </form>

        </div>
    </nav>

    <div class="hero-section">
        <div class="content-overlay">
            <h1 class="hero-title">Xush kelibsiz, {{ user.full_name }}!</h1>
            <div class="hero-desc">
                Bizning mahalla eng zo'rlariga loyiq
            </div>
        </div>

        <div class="extra-actions">
            <a href="{% url 'mahallauz2' %}" class="btn btn-green" style="padding: 18px;">Mahallada nima yangilik?</a>
        </div>

        <div class="dev-info" onclick="openAdminModal()">
            Dasturchi: Ashurboyev Shoxjahon
        </div>
    </div>

    <script>
        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }

        function openAdminModal() {
            document.getElementById('adminModal').style.display = 'block';
            document.getElementById('adminPass').value = ""; // Oldingi kodni tozalash
            document.getElementById('adminPass').focus();
        }

        function closeAdminModal() {
            document.getElementById('adminModal').style.display = 'none';
            document.getElementById('errorMsg').style.display = 'none';
        }

        function checkAdminPass() {
            var pass = document.getElementById('adminPass').value;
            // Django URL'ni o'zgaruvchiga olamiz
            var redirectUrl = "{% url 'I' %}";

            if (pass === "BMK3") {
                window.location.href = redirectUrl;
            } else {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('adminModal').style.animation = "shake 0.4s ease-in-out";
                setTimeout(() => {
                    document.getElementById('adminModal').style.animation = "";
                }, 400);
            }
        }

        // Enter tugmasini bosganda ham kiradigan qilish
        document.getElementById('adminPass').addEventListener("keyup", function(event) {
            if (event.key === "Enter") {
                checkAdminPass();
            }
        });
    </script>

</body>
</html>
